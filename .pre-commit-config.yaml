# ══════════════════════════════════════════════════════════════════
# .pre-commit-config.yaml — deep-funnel-station
# Instalar: pip install pre-commit && pre-commit install
# Ejecutar manualmente: pre-commit run --all-files
# ══════════════════════════════════════════════════════════════════

default_language_version:
  python: python3.12

default_stages: [pre-commit]

repos:
  # ── Prioridad 1: Secretos (falla primero si hay keys expuestas) ──────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: 🔒 gitleaks — scan for secrets
        args: [--config, .gitleaks.toml]

  # ── Prioridad 2: Formato Python ──────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        name: ✅ black — format Python
        language_version: python3.12
        args: [--line-length=100]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: ✅ isort — sort imports
        args: [--profile=black, --line-length=100]

  # ── Prioridad 3: Lint Python ─────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ✅ ruff — lint
        args: [--fix, --exit-non-zero-on-fix]

  # ── Prioridad 4: Checks generales ────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
        name: ✅ no merge conflicts
      - id: check-yaml
        name: ✅ valid YAML
      - id: check-json
        name: ✅ valid JSON
      - id: check-toml
        name: ✅ valid TOML
      - id: end-of-file-fixer
        name: ✅ EOF newline
      - id: trailing-whitespace
        name: ✅ no trailing whitespace
      - id: check-added-large-files
        name: ✅ no large files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        name: ⛔ no direct commits to main
        args: [--branch=main]
      - id: detect-private-key
        name: 🔒 detect private keys

  # ── Prioridad 5: Seguridad Python ────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        name: 🔒 bandit — SAST security scan
        args: [-c, pyproject.toml, -ll, -ii]
        files: ^backend/

  # ── Prioridad 6: Frontend ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: ✅ prettier — format TypeScript/CSS
        types_or: [javascript, jsx, ts, tsx, css, json, markdown]
        files: ^frontend/
        additional_dependencies:
          - prettier@3.4.2
          - prettier-plugin-tailwindcss@0.6.9
